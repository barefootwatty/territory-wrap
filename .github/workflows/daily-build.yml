name: Build daily bulletin

# Fully autonomous morning build. Runs on GitHub's servers on a timer — no Mac,
# no human, no approvals. Curates the day's stories (Claude), renders the voice
# (OpenAI), self-hosts images, rebuilds the feed + site, and commits. Vercel then
# redeploys. This replaces the old Cowork scheduled task end-to-end.

on:
  schedule:
    - cron: "0 20 * * *"   # 20:00 UTC = 5:30am ACST (Watty's Top End morning)
  workflow_dispatch:        # lets us press "Run workflow" to test on demand

permissions:
  contents: write

concurrency:
  group: daily-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng
          python3 -m pip install --upgrade anthropic

      - name: Curate today's stories
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 engine/autobuild.py

      - name: Render voice + build feed/site
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 engine/publish.py

      - name: Commit + publish
        run: |
          git config user.name  "barefoot-daily-news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f site/episodes/*.mp3
          git add -f site/img
          git add site/feed.xml site/data.json site/index.html episodes/*.json episodes/*.script.txt
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Daily bulletin: ${{ github.run_id }}"
            git push
          fi
